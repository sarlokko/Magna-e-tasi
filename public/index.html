<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Magna e tasi — ricette di cucina con video e procedimento passo passo">
  <meta name="theme-color" content="#1a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Magna e tasi">
  <title>Magna e tasi</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <p class="site-label">Cucina italiana</p>
      <h1>Magna e tasi</h1>
      <p class="site-tagline">Le ricette galleggiano nel brodo — tocca per aprire</p>
    </div>
  </header>

  <section class="bowl-section" aria-label="Selezione ricette">
    <div class="donburi-wrap">
      <div class="donburi-shadow" aria-hidden="true"></div>

      <div class="donburi" id="donburi">
        <div class="bowl-body" aria-hidden="true">
          <div class="bowl-pattern bowl-pattern-outer"></div>
          <div class="bowl-band bowl-band-gold"></div>
          <div class="bowl-band bowl-band-red"></div>
          <div class="bowl-motif bowl-motif-left" aria-hidden="true">梅</div>
          <div class="bowl-motif bowl-motif-right" aria-hidden="true">花</div>
        </div>

        <div class="bowl-rim" aria-hidden="true">
          <div class="rim-highlight"></div>
          <div class="rim-red-ring"></div>
        </div>

        <div class="donburi-broth" id="donburi-broth">
          <div class="broth-glow"></div>
          <div class="broth-shimmer"></div>
          <div class="broth-ripple ripple-1"></div>
          <div class="broth-ripple ripple-2"></div>
          <div class="broth-ripple ripple-3"></div>
          <div class="broth-steam steam-1"></div>
          <div class="broth-steam steam-2"></div>
          <div class="broth-steam steam-3"></div>
          <div class="broth-floats" id="broth-floats" role="list" aria-label="Ricette galleggianti"></div>
        </div>

        <p class="bowl-hint">Tocca una ricetta per aprirla</p>
      </div>
    </div>
  </section>

  <main class="recipe-stage hidden" id="recipe-stage" aria-live="polite">
    <div class="recipe-stage-inner">
      <button type="button" id="btn-back" class="btn-back">← Torna alla bowl</button>

      <article class="recipe-split" id="recipe-split">
        <section class="recipe-video-panel" aria-label="Video ricetta">
          <div class="video-frame" id="video-frame">
            <p class="video-placeholder">Seleziona una ricetta dalla bowl</p>
          </div>
          <p class="video-caption" id="video-caption"></p>
        </section>

        <section class="recipe-detail-panel" aria-label="Dettaglio ricetta">
          <header class="recipe-detail-header">
            <div class="detail-thumb" id="detail-thumb" aria-hidden="true"></div>
            <div>
              <p id="detail-category" class="detail-category"></p>
              <h2 id="detail-title"></h2>
              <p id="detail-description" class="detail-description"></p>
            </div>
          </header>

          <div class="detail-meta" id="detail-meta"></div>
          <div class="detail-tags" id="detail-tags"></div>

          <div class="detail-columns">
            <section class="detail-block">
              <h3>Ingredienti</h3>
              <ul id="detail-ingredients"></ul>
            </section>
            <section class="detail-block">
              <h3>Procedimento</h3>
              <ol id="detail-steps"></ol>
            </section>
          </div>
        </section>
      </article>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Magna e tasi — Buon appetito!</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
